<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Document AI Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4285f4;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .upload-section {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: rgba(66, 133, 244, 0.05);
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .job-list {
            margin-top: 2rem;
        }

        .job-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pill {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pending { background: #52525b; }
        .status-processing { background: #3b82f6; animation: pulse 1.5s infinite; }
        .status-completed { background: #059669; }
        .status-failed { background: #dc2626; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .result-data {
            font-family: monospace;
            font-size: 0.85rem;
            background: #000;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: #10b981;
            margin-top: 0.5rem;
            overflow-x: auto;
        }

        .confidence-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 0.25rem;
            position: relative;
        }

        .confidence-fill {
            height: 100%;
            background: var(--success);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Document AI Lab</h1>
    <p class="subtitle">Powered by Google Gemini 1.5 Flash</p>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        <p>Click to select multiple PDF or Image files</p>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf" onchange="handleFiles(this.files)">
    </div>

    <div id="jobList" class="job-list"></div>
</div>

<script>
    const jobList = document.getElementById('jobList');
    const jobs = new Map();

    async function handleFiles(files) {
        if (!files.length) return;

        const formData = new FormData();
        for (const file of files) {
            formData.append('files', file);
        }

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (data.jobIds) {
                data.jobIds.forEach(id => {
                    addJobToUI(id);
                    pollStatus(id);
                });
            }
        } catch (error) {
            console.error('Upload failed:', error);
        }
    }

    function addJobToUI(jobId) {
        const card = document.createElement('div');
        card.className = 'job-card';
        card.id = `job-${jobId}`;
        card.innerHTML = `
            <div class="job-header">
                <div>
                    <span style="font-weight:600">Job ID:</span> ${jobId.substring(0, 8)}...
                    <div class="file-name" style="font-size:0.8rem; color:var(--text-muted)">Uploading...</div>
                </div>
                <span class="status-pill status-pending">Pending</span>
            </div>
            <div class="job-body"></div>
        `;
        jobList.prepend(card);
        jobs.set(jobId, card);
    }

    async function pollStatus(jobId) {
        const interval = setInterval(async () => {
            try {
                const response = await fetch(`/api/status/${jobId}`);
                const data = await response.json();
                
                updateJobUI(jobId, data);

                if (data.status === 'COMPLETED' || data.status === 'FAILED') {
                    clearInterval(interval);
                }
            } catch (error) {
                console.error('Polling error:', error);
                clearInterval(interval);
            }
        }, 2000);
    }

    function updateJobUI(jobId, data) {
        const card = jobs.get(jobId);
        if (!card) return;

        const statusPill = card.querySelector('.status-pill');
        statusPill.textContent = data.status;
        statusPill.className = `status-pill status-${data.status.toLowerCase()}`;

        const fileName = card.querySelector('.file-name');
        fileName.textContent = data.fileName || 'Processing...';

        const body = card.querySelector('.job-body');
        if (data.status === 'COMPLETED' && data.result) {
            body.innerHTML = `
                <div class="result-data">
                    <pre>${JSON.stringify(data.result, null, 2)}</pre>
                </div>
                <div style="font-size:0.75rem; margin-top:0.5rem">Confidence: ${(data.result.confidence * 100).toFixed(1)}%</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${data.result.confidence * 100}%"></div>
                </div>
            `;
        } else if (data.status === 'FAILED') {
            body.innerHTML = `<div style="color:var(--error); font-size:0.85rem">${data.errorMessage}</div>`;
        }
    }
</script>

</body>
</html>
